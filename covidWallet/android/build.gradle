// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        firebaseMessagingVersion = "21.1.0" // default: "21.1.0"

        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "27.1.12297006"
        kotlinVersion = "1.8.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath('com.google.gms:google-services:4.4.0')
    }
    allprojects {
      repositories {
         jcenter() {
            content {
                // these groups only available in jcenter otherwise we don't want to rely on jcenter.
                includeModule("com.wei.android.lib", "fingerprintidentify") // <== Add this line
            }
        }
          maven { url 'https://maven.zohodl.com' }
          maven { url 'https://www.jitpack.io' }
      }
    }
    subprojects { subproject ->
        afterEvaluate {
            if (subproject.hasProperty("android")) {
                subproject.android.ndkVersion = rootProject.ext.ndkVersion
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
