apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
project.ext.envConfigFiles = [
  zadawalletrelease: ".env.production",
  zadawalletdebug: ".env.development",
  seawalletrelease: ".env.seafarer.production",
  seawalletdebug: ".env.seafarer.development"
];
apply plugin: "com.facebook.react"
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"
apply plugin: 'com.google.gms.google-services'

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Autolinking */
    debuggableVariants = ["zadaWalletDebug", "seaWalletDebug"]
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

// get version code from the specified property argument `-PversionCode` during the build call
def getMyVersionCode = { ->
    return project.hasProperty('versionCode') ? versionCode.toInteger() : 1
}

// get version name from the specified property argument `-PversionName` during the build call
def getMyVersionName = { ->
     return project.hasProperty('versionName') ? versionName : "1.0"
}

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

project.ext.react = [
    enableHermes: true  
]

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.zadanetwork.wallet"
    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 203
        versionName "1.6.8"
        resValue "string", "build_config_package", "com.zadanetwork.wallet"
        missingDimensionStrategy 'react-native-camera', 'general'
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    flavorDimensions "app"

    productFlavors {
        zadaWallet {
            dimension "app"
            applicationId "com.zadanetwork.wallet"
            versionCode 203
            versionName "1.6.8"
            resValue "string", "app_name", "ZADA"
        }
        seaWallet {
            dimension "app"
            applicationId "com.zadanetwork.seawallet" 
            versionCode 1
            versionName "1.0.0"
            resValue "string", "app_name", "SeaWallet"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
              if (System.getenv()["CI"]) { // CI=true is exported by Codemagic
                  storeFile file(System.getenv()["CM_KEYSTORE_PATH"])
                  storePassword System.getenv()["CM_KEYSTORE_PASSWORD"]
                  keyAlias System.getenv()["CM_KEY_ALIAS"]
                  keyPassword System.getenv()["CM_KEY_PASSWORD"]
              } else {            
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    // implementation("com.facebook.react:flipper-integration")
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-notifications')
    implementation(platform('com.google.firebase:firebase-bom:32.5.0'))
    implementation 'com.google.firebase:firebase-analytics'
    //FingerPrint scanner Library
    implementation project(':react-native-fingerprint-scanner')
    
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"
    implementation ("androidx.appcompat:appcompat:1.3.1") {
        version {
            strictly '1.3.1'
        }
    }

    implementation 'com.zoho.salesiq:mobilisten:8.2.3'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    implementation 'com.facebook.fresco:fresco:3.6.0'
    // For animated GIF support
    implementation 'com.facebook.fresco:animated-gif:3.6.0'
}
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle" 
// apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)